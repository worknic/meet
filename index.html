* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  min-height: 100%;
  background: #F5F0E8;
  font-family: 'SpoqaHanSansNeo', 'Noto Sans KR', sans-serif;
}
.page {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 5rem 2rem 6rem;
  position: relative;
}
.comma-wrap {
  position: fixed;
  top: -40px;
  right: -60px;
  width: 360px;
  opacity: 0.065;
  pointer-events: none;
  z-index: 0;
}
.comma-wrap svg {
  width: 100%;
  height: auto;
}
.wrap {
  width: 100%;
  max-width: 500px;
  position: relative;
  z-index: 1;
}
.brand-label {
  font-size: 10px;
  letter-spacing: 0.22em;
  color: #9C9288;
  text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 2.25rem;
}
.form-title {
  font-size: 30px;
  font-weight: 500;
  color: #1A1814;
  letter-spacing: 0.01em;
  margin-bottom: 1.5rem;
  line-height: 1.2;
}
.form-sub {
  font-size: 14px;
  font-weight: 400;
  color: #7A7268;
  line-height: 2.3;
  margin-bottom: 3rem;
}
.form-sub span { display: block; }
.divider {
  border: none;
  border-top: 0.5px solid #CEC6B6;
  margin: 0 0 2.75rem;
}
.field { margin-bottom: 2.25rem; }
.field label {
  display: block;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.16em;
  color: #4A4640;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.field input,
.field textarea {
  width: 100%;
  background: rgba(245,240,232,0.3);
  border: none;
  border-bottom: 0.5px solid #C5BBB0;
  border-radius: 0;
  padding: 10px 0;
  font-size: 14px;
  font-weight: 400;
  font-family: 'SpoqaHanSansNeo', 'Noto Sans KR', sans-serif;
  color: #1A1814;
  outline: none;
  transition: border-color 0.25s, background 0.25s;
  -webkit-appearance: none;
}
.field input::placeholder,
.field textarea::placeholder {
  color: #C8C0B4;
  font-weight: 400;
  font-size: 13px;
}
.field input:focus,
.field textarea:focus {
  border-bottom-color: #8A8278;
  background: rgba(245,240,232,0.55);
}
.field textarea {
  resize: vertical;
  min-height: 108px;
  line-height: 1.9;
}
.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 28px;
}
.submit-btn {
  width: 100%;
  margin-top: 3.25rem;
  padding: 17px;
  font-size: 11px;
  font-family: 'SpoqaHanSansNeo', 'Noto Sans KR', sans-serif;
  font-weight: 500;
  letter-spacing: 0.22em;
  background: #1A1814;
  color: #F5F0E8;
  border: none;
  border-radius: 0;
  cursor: pointer;
  text-transform: uppercase;
  transition: opacity 0.2s;
}
.submit-btn:hover { opacity: 0.72; }
.success { display: none; padding: 5rem 0; }
.success-brand {
  font-size: 10px;
  letter-spacing: 0.22em;
  color: #9C9288;
  text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 2.5rem;
}
.success-title {
  font-size: 24px;
  font-weight: 500;
  color: #1A1814;
  margin-bottom: 1.5rem;
  letter-spacing: 0.01em;
}
.success-body {
  font-size: 14px;
  font-weight: 400;
  color: #7A7268;
  line-height: 2.3;
}
@media (max-width: 480px) {
  .page { padding: 3.5rem 1.5rem 4rem; }
  .row { grid-template-columns: 1fr; gap: 0; }
  .comma-wrap { width: 240px; top: -20px; right: -30px; }
}
</style>

      <div class="field">
        <label>이메일</label>
        <input type="email" id="email" placeholder="hello@worknic.co.kr">
      </div>
      <div class="field" style="margin-top:2rem;">
        <label style="font-size:16px;letter-spacing:0.02em;color:#2A2620;font-weight:500;margin-bottom:6px;text-transform:none;">지금 매장, 어떠세요?</label>
        <p style="font-size:12px;color:#C0B8B0;font-weight:400;margin-bottom:12px;line-height:1.7;">잘 되는 것도, 안 되는 것도, 그냥 털어놓고 싶은 것도 괜찮아요.</p>
        <textarea id="concern" placeholder="편하게 적어주세요."></textarea>
      </div>

      <div style="margin-top:2.75rem;">
        <p style="font-size:12px;font-weight:400;color:#A09890;line-height:1.9;margin-bottom:1rem;">
          신청과 함께 WORKNIC의 인터뷰와 브랜드 스토리를 이메일로 보내드립니다.
        </p>
        <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;margin-bottom:1.5rem;">
          <input type="checkbox" id="privacy" style="margin-top:3px;width:14px;height:14px;flex-shrink:0;accent-color:#1A1814;cursor:pointer;">
          <span style="font-size:12px;font-weight:400;color:#A09890;line-height:1.8;">
            개인정보 수집 및 이용에 동의합니다.<br>
            <span style="font-size:11px;color:#C0B8B0;line-height:1.9;">
              입력하신 이름, 연락처, 이메일은 만남 일정을 조율하고<br>워크닉의 브랜드 자료를 보내드리는 용도로만 사용됩니다.<br>목적이 완료되면 바로 삭제해드릴게요.
            </span>
          </span>
        </label>
        <button class="submit-btn" onclick="handleSubmit()">신청하기</button>
      </div>
    </div>

    <div class="success" id="success-view">
      <div class="success-brand">WORKNIC</div>
      <div class="success-title">신청이 완료됐습니다.</div>
      <div class="success-body">
        보내주신 이야기, 직접 읽겠습니다.<br>
        확인 후 연락드리겠습니다.<br><br>
        — Blake Cho
      </div>
    </div>
  </div>
</div>

<script>
async function handleSubmit() {
  var name = document.getElementById('name').value.trim();
  var phone = document.getElementById('phone').value.trim();
  var store = document.getElementById('store').value.trim();
  var location = document.getElementById('location').value.trim();
  var email = document.getElementById('email').value.trim();
  var concern = document.getElementById('concern').value.trim();
  var privacy = document.getElementById('privacy').checked;

  if (!privacy) {
    alert('개인정보 수집 및 이용에 동의해주세요.');
    return;
  }
  if (!name || !phone || !store || !location) {
    alert('이름, 매장명, 지역, 연락처를 입력해주세요.');
    return;
  }

  var btn = document.querySelector('.submit-btn');
  btn.textContent = '전송 중...';
  btn.disabled = true;

  try {
    // 1. Formspree - Blake에게 알림
    var formspreeRes = await fetch('https://formspree.io/f/xojpkvyq', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({
        이름: name,
        매장명: store,
        지역: location,
        연락처: phone,
        이메일: email,
        고민: concern
      })
    });

    // 2. Loops - 연락처 등록 후 자동 이메일 발송
    if (email) {
      // 2-1. 연락처 등록
      await fetch('https://app.loops.so/api/v1/contacts/create', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer eac62caf5c969a175f0bfccd5beb6eb7'
        },
        body: JSON.stringify({
          email: email,
          firstName: name,
          source: 'meet-form'
        })
      });

      // 2-2. 트랜잭셔널 이메일 발송
      await fetch('https://app.loops.so/api/v1/transactional', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer eac62caf5c969a175f0bfccd5beb6eb7'
        },
        body: JSON.stringify({
          transactionalId: 'cmnjgv9un08su0ivy0eza64y2',
          email: email,
          dataVariables: {
            name: name
          }
        })
      });
    }

    if (formspreeRes.ok) {
      document.getElementById('form-view').style.display = 'none';
      document.getElementById('success-view').style.display = 'block';
    } else {
      throw new Error('전송 실패');
    }
  } catch (e) {
    alert('전송 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
    btn.textContent = '신청하기';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
